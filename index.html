<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pearl Alaya | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        body { background-color: #F5F2EF; color: #4A4036; }
        .polaroid { 
            background: white; 
            padding: 10px 10px 30px 10px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .polaroid:hover { transform: scale(1.02); }
        .marquee { overflow: hidden; white-space: nowrap; }
        .marquee-inner { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col overflow-x-hidden">

    <header class="p-8 flex flex-col items-center justify-center gap-4 z-10">
        <img src="TPL_Logo.jpg" alt="The Pearl Alaya Logo" class="h-24 w-auto object-contain">
        <h1 class="font-serif text-3xl tracking-[0.2em] uppercase">The Pearl Alaya</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center relative p-4">
        <p class="font-serif text-sm tracking-[0.3em] uppercase mb-12">A New Era of Beauty Is Near</p>
        
        <!-- Left Polaroids -->
        <div class="hidden md:flex absolute top-20 left-[15%] -rotate-3 w-48 polaroid">
            <img src="TPL_Suit.jpeg" alt="Collection" class="w-full h-64 object-cover">
        </div>
        <div class="hidden md:flex absolute top-40 left-[5%] rotate-2 w-40 polaroid">
            <img src="TPL_Wait.jpg" alt="Collection" class="w-full h-56 object-cover">
        </div>

        <!-- Main Title -->
        <h2 class="font-serif text-7xl md:text-9xl italic font-light z-10 text-center">Coming Soon.</h2>

        <!-- Right Polaroids -->
        <div class="hidden md:flex absolute bottom-20 right-[15%] rotate-6 w-48 polaroid">
            <img src="TPL_Wait.jpg" alt="Collection" class="w-full h-64 object-cover">
        </div>
        <div class="hidden md:flex absolute bottom-40 right-[5%] -rotate-2 w-40 polaroid">
            <img src="TPL_Suit.jpeg" alt="Collection" class="w-full h-56 object-cover">
        </div>
    </main>

    <footer class="py-8 marquee font-serif text-sm uppercase tracking-widest border-t border-stone-200 mt-12">
        <div class="marquee-inner">
            <span>Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal</span>
        </div>
    </footer>
</body>
</html>
