<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pearl Alaya | Luxury Chikankari Couture (Coming Soon)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            mauve: '#9D807A',
                            accent: '#D4AF37',
                            cream: '#FDFBF7',
                            dark: '#2E2524',
                            soft: '#F4ECE1'
                        }
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-1 { animation-delay: 0.2s; opacity: 0; }
        .delay-2 { animation-delay: 0.4s; opacity: 0; }
        .delay-3 { animation-delay: 0.6s; opacity: 0; }
        .gold-shimmer { background: linear-gradient(120deg, #d4af37 0%, #f5e4a3 50%, #d4af37 100%); background-size: 200% auto; transition: 0.5s; }
        .gold-shimmer:hover { background-position: right center; }
    </style>
</head>
<body class="font-sans text-brand-dark min-h-screen flex flex-col justify-between overflow-x-hidden relative bg-cover bg-center bg-no-repeat bg-fixed" 
      style="background-image: linear-gradient(rgba(157, 128, 122, 0.62), rgba(157, 128, 122, 0.62)), url('Pearl Alaya logo_3.jpg');">

    <header class="w-full py-6 px-6 md:px-12 z-20 flex justify-between items-center relative border-b border-white/10 bg-brand-mauve/40 backdrop-blur-md">
        <div class="flex items-center space-x-3">
            <span class="text-brand-cream tracking-[0.3em] text-xs font-semibold uppercase">T P A</span>
        </div>
        <a href="https://www.instagram.com/thepearlalaya/" target="_blank" rel="noopener noreferrer" 
           class="text-brand-cream/90 hover:text-brand-cream text-sm transition-all duration-300 flex items-center space-x-2 group">
            <i class="fab fa-instagram text-lg group-hover:scale-110 transition-transform"></i>
            <span class="tracking-widest uppercase text-xs font-medium hidden sm:inline">@thepearlalaya</span>
        </a>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-4 py-8 md:py-16 relative z-10">
        <div class="max-w-4xl w-full mb-16">
            <div class="bg-brand-cream/95 p-6 md:p-10 rounded-[40px] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.45)] border border-white/60 backdrop-blur-lg animate-fade-in relative overflow-hidden">
                <div class="flex flex-col md:flex-row gap-8 items-center">
                    <div class="w-full md:w-1/3">
                        <div class="relative rounded-2xl overflow-hidden shadow-md border border-brand-soft bg-white p-1">
                            <div class="aspect-[3/4] overflow-hidden rounded-xl">
                                <img src="TPL_Suit.jpeg" alt="The Pearl Alaya Hand-embroidered Suit" class="w-full h-full object-cover transform hover:scale-105 transition-transform duration-700">
                            </div>
                        </div>
                    </div>
                    <div class="text-center md:text-left w-full md:w-2/3">
                        <h1 class="font-serif text-3xl md:text-4xl text-brand-dark tracking-[0.12em] uppercase mb-4 font-normal">Coming Soon</h1>
                        <p class="text-brand-dark/75 text-sm md:text-base leading-relaxed mb-8">Premium handcrafted Chikankari couture for the modern soul.</p>
                        <form id="waitlist-form" onsubmit="handleFormSubmit(event)" class="space-y-3">
                            <div class="flex flex-col sm:flex-row gap-2">
                                <input type="email" required id="email" placeholder="Enter Your Email" class="flex-grow px-4 py-3 rounded-xl bg-brand-soft/40 border border-brand-dark/10 focus:border-brand-accent focus:outline-none text-sm">
                                <button type="submit" class="gold-shimmer text-brand-dark font-bold text-xs tracking-widest uppercase px-6 py-3 rounded-xl">Request Invite</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <section class="max-w-xl w-full px-4 animate-fade-in delay-2">
            <div class="rounded-3xl overflow-hidden shadow-2xl border border-brand-accent/20">
                <img src="TPL_Wait.jpg" alt="The Pearl Alaya Narrative Cover" class="w-full h-auto object-cover">
            </div>
        </section>
    </main>

    <footer class="w-full py-6 px-6 text-center z-10 border-t border-white/10 bg-brand-mauve/90 backdrop-blur-sm">
        <p class="text-brand-cream/80 text-[10px] tracking-[0.2em] uppercase">&copy; 2026 The Pearl Alaya. All Rights Reserved.</p>
    </footer>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault();
            const emailInput = document.getElementById('email');
            if (emailInput.value) {
                alert('Thank you for joining our waitlist!');
                emailInput.value = '';
            }
        }
    </script>
</body>
</html>
