<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pearl Alaya | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        body { background-color: #F5F2EF; color: #4A4036; }
        .polaroid { 
            background: white; 
            padding: 10px 10px 30px 10px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .polaroid:hover { transform: scale(1.05); }
        .marquee { overflow: hidden; white-space: nowrap; }
        .marquee-inner { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col overflow-x-hidden">

    <header class="p-8 flex justify-between items-center z-10">
        <h1 class="font-serif text-2xl tracking-widest uppercase">The Pearl Alaya</h1>
        <div class="text-sm tracking-widest uppercase"></div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center relative p-4">
        <p class="font-serif text-sm tracking-[0.3em] uppercase mb-12">A New Era of Beauty Is Near</p>
        
        <!-- Polaroids Section -->
        <div class="hidden md:flex absolute top-20 left-[10%] -rotate-3 w-48 polaroid">
            <img src="TPL_Suit.jpeg" alt="Collection" class="w-full h-64 object-cover">
        </div>
        <div class="hidden md:flex absolute bottom-20 right-[10%] rotate-6 w-48 polaroid">
            <img src="TPL_Wait.jpg" alt="Collection" class="w-full h-64 object-cover">
        </div>

        <h2 class="font-serif text-8xl md:text-9xl italic font-light z-10">Coming Soon.</h2>
    </main>

    <footer class="py-8 marquee font-serif text-sm uppercase tracking-widest border-t border-stone-200">
        <div class="marquee-inner">
            <span>Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal</span>
        </div>
    </footer>
</body>
</html>
