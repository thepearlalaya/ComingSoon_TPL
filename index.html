<!DOCTYPE html>
<html lang="en">
<head>
    <!-- STREAMING_CHUNK:Initializing document metadata... -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pearl Alaya | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        body { background-color: #F5F2EF; color: #4A4036; }
        .polaroid { 
            background: white; 
            padding: 10px 10px 30px 10px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .polaroid:hover { transform: scale(1.02); }
        .marquee { overflow: hidden; white-space: nowrap; }
        .marquee-inner { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col overflow-x-hidden">

    <!-- STREAMING_CHUNK:Defining brand header with centered logo... -->
    <header class="p-6 md:p-8 flex flex-col items-center justify-center gap-2 z-10">
        <img src="TPL_Logo.jpg" alt="The Pearl Alaya Logo" class="h-20 md:h-28 w-auto object-contain">
        <h1 class="font-serif text-2xl md:text-3xl tracking-[0.2em] uppercase text-center">The Pearl Alaya</h1>
    </header>

    <!-- STREAMING_CHUNK:Rendering main editorial content... -->
    <main class="flex-grow flex flex-col items-center justify-center relative p-6 md:p-4">
        <p class="font-serif text-xs md:text-sm tracking-[0.3em] uppercase mb-8 md:mb-12 text-center">A New Era of Beauty Is Near</p>
        
        <!-- Polaroids (Hidden on small mobile, shown on tablets and up) -->
        <div class="hidden lg:block">
            <div class="absolute top-20 left-[15%] -rotate-3 w-48 polaroid">
                <img src="TPL_Suit.jpeg" alt="Collection" class="w-full h-64 object-cover">
            </div>
            <div class="absolute top-40 left-[5%] rotate-2 w-40 polaroid">
                <img src="TPL_Wait.jpg" alt="Collection" class="w-full h-56 object-cover">
            </div>
            <div class="absolute bottom-20 right-[15%] rotate-6 w-48 polaroid">
                <img src="TPL_Wait.jpg" alt="Collection" class="w-full h-64 object-cover">
            </div>
            <div class="absolute bottom-40 right-[5%] -rotate-2 w-40 polaroid">
                <img src="TPL_Suit.jpeg" alt="Collection" class="w-full h-56 object-cover">
            </div>
        </div>

        <!-- Main Title (Responsive sizing) -->
        <h2 class="font-serif text-5xl md:text-7xl lg:text-9xl italic font-light z-10 text-center">Coming Soon.</h2>
    </main>

    <!-- STREAMING_CHUNK:Setting up editorial footer marquee... -->
    <footer class="py-6 md:py-8 marquee font-serif text-sm uppercase tracking-widest border-t border-stone-200 mt-8 md:mt-12">
        <div class="marquee-inner">
            <span>Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal &nbsp; • &nbsp; Get Ready for the Reveal</span>
        </div>
    </footer>
</body>
</html>
